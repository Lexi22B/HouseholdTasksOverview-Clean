<div class="page">
  <img
    class="illustration"
    src="assets/cleaning_picture.png"
    alt="Registration illustration"
  />

  <h1 class="title">Register Profile</h1>
  <p class="subtitle">Fill out your access information</p>

  <form class="form-card" (ngSubmit)="onCreateAccount()">
    <div class="form-group">
      <label for="houseId">House ID</label>
      <input
        id="houseId"
        type="text"
        placeholder="Provide a house name ID"
        [(ngModel)]="houseId"
        name="houseId"
      />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        placeholder="Choose a password"
        [(ngModel)]="password"
        name="password"
      />
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input
        id="confirmPassword"
        type="password"
        placeholder="Confirm your password"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
      />
    </div>

    <button type="submit" class="create-btn">Create Account</button>
  </form>
</div>
